<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  
  <title>CamCmd - Filmador</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; height: 100vh; }
    
    iframe { width: 100vw; height: 100vh; border: none; position: absolute; top: 0; left: 0; z-index: 1; }

    .tally-border { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; border: 0px solid transparent; transition: border 0.2s; }
    .tally-border.prv { border: 10px solid #22c55e; }
    .tally-border.pgm { border: 15px solid #e53935; }

    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }

    /* ETIQUETA TALLY MENOR E DISCRETA */
    .status-bar { display: flex; justify-content: center; align-items: flex-start; pointer-events: auto; margin-top: 10px; }
    .tally { font-size: 14px; font-weight: bold; padding: 6px 16px; background: rgba(0,0,0,0.85); border-radius: 8px; border: 2px solid #2a2a40; color: #6b6b8a; text-transform: uppercase; letter-spacing: 1px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    .tally.prv { color: #fff; border-color: #22c55e; background: #22c55e; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
    .tally.pgm { color: #fff; border-color: #e53935; background: #e53935; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); animation: blink 1s infinite; }

    .setup-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(18,18,26,0.95); padding: 25px; border-radius: 12px; border: 1.5px solid #2a2a40; z-index: 4; width: 90%; max-width: 320px; pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .setup-box h3 { font-size: 16px; margin-bottom: 15px; color: #4f6ef7; text-align: center; font-weight: 900; }
    .setup-box input { width: 100%; background: #000; border: 1px solid #2a2a40; padding: 12px; color: #fff; border-radius: 6px; margin-bottom: 12px; font-size: 14px; font-weight: bold; text-align: center; }
    .setup-box button { width: 100%; background: #4f6ef7; color: #fff; border: none; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }

    .cmd-alert { background: rgba(124, 58, 237, 0.95); color: white; font-size: 45px; font-weight: 900; padding: 30px; text-align: center; border-radius: 20px; margin: auto; max-width: 95%; box-shadow: 0 15px 40px rgba(0,0,0,0.6); display: none; text-transform: uppercase; border: 4px solid #fff; }

    @keyframes blink { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
  </style>
</head>
<body>

  <div class="setup-box" id="setup">
    <h3>FILMADOR - SETUP</h3>
    <input type="text" id="camName" placeholder="CENA (ex: CAM1)" value="CAM1">
    <input type="text" id="obsIp" placeholder="Cole o link do Ngrok aqui">
    <button onclick="iniciarConfig()">Iniciar Câmara</button>
  </div>

  <iframe id="videoFrame" allow="camera;autoplay;fullscreen"></iframe>

  <div class="tally-border" id="tallyBorder"></div>

  <div class="overlay">
    <div class="status-bar">
      <div class="tally" id="tallyDisplay">DIGITE O LINK</div>
    </div>
    <div class="cmd-alert" id="cmdAlert"></div>
    <div></div>
  </div>

<script>
var ws = null;
var wakeLock = null;

async function iniciarConfig() {
  var cam = document.getElementById('camName').value.trim().toUpperCase();
  var inputConexao = document.getElementById('obsIp').value.trim();
  
  if(!cam || !inputConexao) { alert('Preencha a Câmera e o Link!'); return; }
  
  var elem = document.documentElement;
  if (elem.requestFullscreen) { elem.requestFullscreen(); }
  else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
  else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
  
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock("landscape").catch(function(e) { console.log("Rotação bloqueada pelo SO"); });
  }

  document.getElementById('setup').style.display = 'none';
  atualizarInterfaceTally('A LIGAR...', 'standby');
  
  var streamID = "cmdcam_" + cam.toLowerCase();
  var iframe = document.getElementById('videoFrame');
  iframe.src = "https://vdo.ninja/?push=" + streamID + "&webcam=1&facing=back&clean&transparent&autostart&quality=0&audio=0&zoom";

  try {
    if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); }
  } catch (err) { console.log('WakeLock não suportado.'); }

  conectarOBS(inputConexao, cam);
}

function conectarOBS(inputConexao, camName) {
  var url = inputConexao;
  
  if (url.startsWith("https://")) { url = url.replace("https://", "wss://"); } 
  else if (url.startsWith("http://")) { url = url.replace("http://", "ws://"); } 
  else if (!url.startsWith("ws")) { url = "ws://" + url + ":4455"; }

  ws = new WebSocket(url);

  ws.onopen = function() {
    ws.send(JSON.stringify({ op: 1, d: { rpcVersion: 1 } }));
  };

ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);

    if (msg.op === 5) {
      var ev = msg.d;
      
      // LOGICA CORRIGIDA: 
      // Sempre que qualquer cena mudar no OBS, vamos avaliar o estado ATUAL das cenas
      // Comparando o nome da câmara deste celular com o que o OBS reporta
      
      if (ev.eventType === 'CurrentPreviewSceneChanged' || ev.eventType === 'CurrentProgramSceneChanged') {
        
        // Vamos verificar o status real de tudo
        var program = ev.eventType === 'CurrentProgramSceneChanged' ? ev.eventData.sceneName : null;
        var preview = ev.eventType === 'CurrentPreviewSceneChanged' ? ev.eventData.sceneName : null;

        // Se o OBS não enviou o nome da cena no evento (em alguns casos raros), 
        // a gente não altera nada para não causar erro
        if (ev.eventData && ev.eventData.sceneName) {
           var cenaAtual = ev.eventData.sceneName;

           if (ev.eventType === 'CurrentProgramSceneChanged') {
             if (cenaAtual === camName) {
               atualizarInterfaceTally('● AO VIVO', 'pgm');
             } else {
               // Se outra câmera foi para o AO VIVO, a nossa deve voltar para Standby
               // A menos que ela esteja na prévia
               atualizarInterfaceTally('STANDBY', 'standby');
             }
           }

           if (ev.eventType === 'CurrentPreviewSceneChanged') {
             if (cenaAtual === camName) {
               atualizarInterfaceTally('🎬 PRÉVIA', 'prv');
             } else {
               // Se outra câmera foi para a PRÉVIA, a nossa deve voltar para Standby
               atualizarInterfaceTally('STANDBY', 'standby');
             }
           }
        }
      }

      if (ev.eventType === 'CustomEvent' && ev.eventData.type === 'camcmd') {
        var dados = ev.eventData;
        if (dados.target === camName || dados.target === 'ALL') {
          mostrarComandoOperador(dados.msg);
        }
      }
    }
  };

  ws.onclose = function() {
    atualizarInterfaceTally('A RECONECTAR...', 'standby');
    setTimeout(function() { conectarOBS(inputConexao, camName); }, 2000);
  };
}

function atualizarInterfaceTally(texto, status) {
  var el = document.getElementById('tallyDisplay');
  var border = document.getElementById('tallyBorder');
  
  el.textContent = texto;
  el.className = 'tally ' + status;
  border.className = 'tally-border ' + status;
}

function mostrarComandoOperador(texto) {
  var alertBox = document.getElementById('cmdAlert');
  alertBox.textContent = texto;
  alertBox.style.display = 'block';
  
  // MENSAGEM AGORA FICA 10 SEGUNDOS NA TELA
  setTimeout(function() {
    alertBox.style.display = 'none';
  }, 10000);
}
</script>
</body>
</html>
