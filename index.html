<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CamCmd - Filmador</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; height: 100vh; }
    iframe { width: 100vw; height: 100vh; border: none; position: absolute; top: 0; left: 0; z-index: 1; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
    .tally { font-size: 16px; font-weight: bold; padding: 6px 12px; background: rgba(0,0,0,0.7); border-radius: 20px; border: 1px solid #2a2a40; color: #6b6b8a; }
    .tally.prv { color: #22c55e; border-color: #22c55e; background: rgba(13,31,13,0.9); }
    .tally.pgm { color: #e53935; border-color: #e53935; background: rgba(31,13,13,0.9); animation: blink 1s infinite; }
    .setup-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(18,18,26,0.95); padding: 20px; border-radius: 12px; border: 1.5px solid #2a2a40; z-index: 3; width: 90%; max-width: 320px; pointer-events: auto; }
    .setup-box h3 { font-size: 14px; margin-bottom: 12px; color: #4f6ef7; text-align: center; }
    .setup-box input { width: 100%; background: #000; border: 1px solid #2a2a40; padding: 8px; color: #fff; border-radius: 6px; margin-bottom: 10px; font-size: 13px; }
    .setup-box button { width: 100%; background: #4f6ef7; color: #fff; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .cmd-alert { background: rgba(124, 58, 237, 0.95); color: white; font-size: 38px; font-weight: bold; padding: 25px; text-align: center; border-radius: 15px; margin: auto; max-width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: none; }
    @keyframes blink { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
  </style>
</head>
<body>

  <div class="setup-box" id="setup">
    <h3>CONFIGURAR FILMADOR</h3>
    <input type="text" id="camName" placeholder="Nome da Câmera (ex: CAM1)" value="CAM1">
    <input type="text" id="obsIp" placeholder="IP do OBS (ex: 192.168.1.25)">
    <button onclick="iniciarConfig()">Iniciar Transmissão</button>
  </div>

  <iframe id="videoFrame" allow="camera;autoplay"></iframe>

  <div class="overlay">
    <div class="status-bar">
      <div class="tally" id="tallyDisplay">DIGITE O IP E CLIQUE EM INICIAR</div>
    </div>
    <div class="cmd-alert" id="cmdAlert"></div>
    <div></div>
  </div>

<script>
var ws = null;
var wakeLock = null;

async function iniciarConfig() {
  var cam = document.getElementById('camName').value.trim().toUpperCase();
  var ip = document.getElementById('obsIp').value.trim();
  
  if(!cam || !ip) { alert('Preencha a Câmera e o IP do OBS!'); return; }
  
  document.getElementById('setup').style.display = 'none';
  document.getElementById('tallyDisplay').textContent = "CONECTANDO...";
  
  // Inicializa o VDO.ninja forçando áudio desativado (&audio=0)
  var streamID = "cmdcam_" + cam.toLowerCase();
  var iframe = document.getElementById('videoFrame');
  iframe.src = "https://vdo.ninja/?push=" + streamID + "&webcam=1&facing=back&clean&transparent&autostart&quality=0&audio=0";

  try {
    if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); }
  } catch (err) { console.log('WakeLock não suportado.'); }

  conectarOBS(ip, cam);
}

function conectarOBS(ip, camName) {
  var url = "ws://" + ip + ":4455";
  ws = new WebSocket(url);

  ws.onopen = function() {
    ws.send(JSON.stringify({ op: 1, d: { rpcVersion: 1 } }));
  };

  ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);

    if (msg.op === 2) {
      atualizarInterfaceTally('CONECTADO (STANDBY)', 'standby');
    }

    if (msg.op === 5) {
      var ev = msg.d;
      
      if (ev.eventType === 'CurrentProgramSceneChanged') {
        if(ev.eventData.sceneName === camName) {
          atualizarInterfaceTally('● AO VIVO', 'pgm');
        } else {
          atualizarInterfaceTally('STANDBY', 'standby');
        }
      }
      if (ev.eventType === 'CurrentPreviewSceneChanged') {
        if(ev.eventData.sceneName === camName) {
          atualizarInterfaceTally('🎬 PRÉVIA', 'prv');
        }
      }

      if (ev.eventType === 'BroadcastCustomEvent' && ev.eventData.type === 'camcmd') {
        var dados = ev.eventData;
        if (dados.target === camName || dados.target === 'ALL') {
          mostrarComandoOperador(dados.msg);
        }
      }
    }
  };

  ws.onclose = function() {
    atualizarInterfaceTally('RECONECTANDO...', 'standby');
    setTimeout(function() { conectarOBS(ip, camName); }, 2000);
  };
}

function atualizarInterfaceTally(texto, status) {
  var el = document.getElementById('tallyDisplay');
  el.textContent = texto;
  el.className = 'tally ' + status;
}

function mostrarComandoOperador(texto) {
  var alertBox = document.getElementById('cmdAlert');
  alertBox.textContent = texto;
  alertBox.style.display = 'block';
  
  setTimeout(function() {
    alertBox.style.display = 'none';
  }, 6000);
}
</script>
</body>
</html>
